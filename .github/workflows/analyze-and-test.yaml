name: Lottie Flutter
on:
  pull_request:
  push:
    branches:
      - master

jobs:
  analyze_and_test:
    name: Flutter analyze
    # macOS runners are Apple Silicon, matching the maintainer's machine, so
    # golden rendering stays close enough for the small tolerance in
    # test/flutter_test_config.dart. Flutter is pinned so the engine (and thus
    # the rendered pixels) does not drift.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.44.1'
      - run: flutter doctor
      - run: flutter --version
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: flutter test
        working-directory: example
      - run: flutter pub run tool/prepare_submit.dart
      - name: "check for uncommitted changes"
        run: |
          git diff --exit-code --stat -- . ':(exclude)*pubspec.lock' \
          || (echo "##[error] found changed files after build. please run 'dart tool/prepare_submit.dart'" \
                   "and check in all changes" \
              && exit 1)
        shell: bash
  build_web_version:
    name: Check that the web version can compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter precache web
      - run: flutter pub get
      - run: flutter build web
        working-directory: example
